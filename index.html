<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Sheriff Showdown</title>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{
--sand:#f4d5a0;--terracota:#c45a3c;--dark:#1a1209;--gold:#d4a853;--sky:#4a90b8;
--dust:rgba(210,170,110,0.3);--blood:#8b2020;
}
html,body{width:100%;height:100%;overflow:hidden;touch-action:manipulation}
body{font-family:'Inter',sans-serif;background:var(--dark);color:#fff}

/* ========== SCREENS ========== */
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}

/* ========== TITLE SCREEN ========== */
#title-screen{
background:linear-gradient(180deg,#2a1a08 0%,#5c3310 30%,#c45a3c 60%,#f4d5a0 85%,#d4a853 100%);
}
.title-dust{position:absolute;bottom:0;width:100%;height:30%;background:linear-gradient(0deg,rgba(210,170,110,0.4),transparent);pointer-events:none}
.title-logo{font-family:'Rye',serif;font-size:clamp(2rem,8vw,4rem);color:var(--gold);text-shadow:0 4px 0 #8b5e1a,0 6px 20px rgba(0,0,0,0.5);text-align:center;line-height:1.1;z-index:1}
.title-sub{font-size:clamp(0.7rem,2.5vw,1rem);color:rgba(255,255,255,0.6);letter-spacing:3px;text-transform:uppercase;margin-top:8px;z-index:1}

/* Sheriff idle on title */
.sheriff-idle{width:120px;height:200px;margin:20px 0;z-index:1;position:relative}
.sheriff-idle .body{position:absolute;bottom:0;width:100%;display:flex;flex-direction:column;align-items:center}
.sheriff-idle .hat{width:60px;height:20px;background:#1a1209;border-radius:50%;position:relative;z-index:2}
.sheriff-idle .hat::before{content:'';position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:30px;height:25px;background:#2a1a08;border-radius:4px 4px 0 0}
.sheriff-idle .head{width:20px;height:20px;background:#1a1209;border-radius:50%;position:relative}
.sheriff-idle .hair{position:absolute;top:-2px;left:-3px;right:-3px;height:10px;background:#0a0a0a;border-radius:50% 50% 0 0}
.sheriff-idle .torso{width:3px;height:40px;background:#1a1209;position:relative}
.sheriff-idle .star{position:absolute;top:5px;left:5px;font-size:8px;color:var(--gold)}
.sheriff-idle .arms{position:absolute;top:5px;width:50px;height:3px;display:flex;justify-content:space-between}
.sheriff-idle .arm{width:20px;height:3px;background:#1a1209;border-radius:2px}
.sheriff-idle .arm.right{transform:rotate(20deg);transform-origin:left}
.sheriff-idle .arm.left{transform:rotate(-20deg);transform-origin:right}
.sheriff-idle .legs{display:flex;gap:8px;margin-top:0}
.sheriff-idle .leg{width:3px;height:35px;background:#1a1209;border-radius:0 0 2px 2px}
.sheriff-idle .leg.left{transform:rotate(-5deg)}
.sheriff-idle .leg.right{transform:rotate(5deg)}
.sheriff-idle .gun{position:absolute;right:-12px;top:8px;width:15px;height:6px;background:#333;border-radius:1px}

.btn-play{
z-index:1;margin-top:20px;padding:18px 60px;font-family:'Rye',serif;font-size:clamp(1rem,4vw,1.5rem);
color:var(--dark);background:linear-gradient(135deg,var(--gold),#e8c36a);border:none;border-radius:50px;
cursor:pointer;box-shadow:0 6px 0 #8b5e1a,0 8px 30px rgba(0,0,0,0.4);
transition:all 0.1s;letter-spacing:2px}
.btn-play:active{transform:translateY(4px);box-shadow:0 2px 0 #8b5e1a}

.title-scores{z-index:1;margin-top:15px;font-size:0.75rem;color:rgba(255,255,255,0.4)}

/* ========== GAME SCREEN ========== */
#game-screen{
background:linear-gradient(180deg,var(--sky) 0%,#87CEEB 30%,#f5deb3 65%,var(--sand) 75%,#c2a06a 100%);
padding:0;flex-direction:column;justify-content:flex-start}

.game-hud{width:100%;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;z-index:10}
.hud-score{font-family:'Rye',serif;font-size:clamp(1.2rem,4vw,2rem);color:var(--gold);text-shadow:0 2px 4px rgba(0,0,0,0.3)}
.hud-combo{font-size:0.7rem;color:var(--terracota);font-weight:900;letter-spacing:1px}
.hud-lives{display:flex;gap:4px}
.hud-life{font-size:1.2rem}
.hud-wave{font-size:0.65rem;color:rgba(0,0,0,0.4);text-transform:uppercase;letter-spacing:2px}

/* Arena */
.arena{flex:1;width:100%;position:relative;display:flex;align-items:flex-end;justify-content:center;padding-bottom:10%}

/* Stickmen in arena */
.duelist{position:absolute;bottom:15%;display:flex;flex-direction:column;align-items:center}
.duelist.sheriff{left:15%}
.duelist.villain{right:15%;transform:scaleX(-1)}
.duelist .d-hat{width:40px;height:14px;background:#1a1209;border-radius:50%}
.duelist .d-hat::before{content:'';position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:22px;height:18px;background:#2a1a08;border-radius:3px 3px 0 0}
.duelist.villain .d-hat{background:var(--blood)}
.duelist.villain .d-hat::before{background:#6b1515}
.duelist .d-head{width:14px;height:14px;background:#1a1209;border-radius:50%}
.duelist.villain .d-head{background:var(--blood)}
.duelist .d-body{width:3px;height:30px;background:#1a1209}
.duelist.villain .d-body{background:var(--blood)}
.duelist .d-legs{display:flex;gap:6px}
.duelist .d-leg{width:3px;height:25px;background:#1a1209}
.duelist.villain .d-leg{background:var(--blood)}
.duelist .d-arm-gun{position:absolute;top:34px;width:25px;height:3px;background:#1a1209}
.duelist.sheriff .d-arm-gun{right:-25px}
.duelist.villain .d-arm-gun{left:-25px;background:var(--blood)}
.duelist .d-gun{position:absolute;top:-3px;right:-10px;width:12px;height:5px;background:#444;border-radius:1px}

/* Countdown */
.countdown{position:absolute;top:30%;left:50%;transform:translateX(-50%);font-family:'Rye',serif;font-size:clamp(3rem,12vw,6rem);color:var(--gold);text-shadow:0 4px 10px rgba(0,0,0,0.3);z-index:20;opacity:0;transition:opacity 0.2s}
.countdown.show{opacity:1}
.countdown.draw{color:var(--terracota);font-size:clamp(3.5rem,14vw,7rem)}

/* Tug of war bar */
.tug-container{position:absolute;bottom:30%;left:50%;transform:translateX(-50%);width:80%;max-width:350px;z-index:10}
.tug-bar{width:100%;height:16px;background:rgba(0,0,0,0.15);border-radius:10px;overflow:hidden;position:relative;border:2px solid rgba(0,0,0,0.1)}
.tug-fill{position:absolute;top:0;left:0;height:100%;width:50%;background:linear-gradient(90deg,var(--gold),var(--terracota));border-radius:8px;transition:width 0.05s}
.tug-center{position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:3px;height:24px;background:rgba(0,0,0,0.3);border-radius:2px}
.tug-label-l,.tug-label-r{position:absolute;top:-18px;font-size:0.55rem;font-weight:900;color:rgba(0,0,0,0.3);text-transform:uppercase;letter-spacing:1px}
.tug-label-l{left:0}
.tug-label-r{right:0}

/* TAP ZONE */
.tap-zone{position:absolute;bottom:0;width:100%;height:35%;z-index:30;display:none;align-items:center;justify-content:center;background:linear-gradient(0deg,rgba(26,18,9,0.6),transparent)}
.tap-zone.active{display:flex}
.tap-btn{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,var(--terracota),#8b2020);border:4px solid var(--gold);box-shadow:0 0 30px rgba(196,90,60,0.5),0 8px 0 #6b1515;display:flex;align-items:center;justify-content:center;font-family:'Rye',serif;font-size:1rem;color:var(--gold);cursor:pointer;transition:transform 0.05s}
.tap-btn:active{transform:scale(0.92);box-shadow:0 0 15px rgba(196,90,60,0.3),0 2px 0 #6b1515}
.tap-btn .tap-icon{font-size:2rem}

/* Screen shake */
.shake{animation:shake 0.1s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* Capture animation */
.capture-flash{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(212,168,83,0.3);z-index:50;opacity:0;pointer-events:none;transition:opacity 0.1s}
.capture-flash.active{opacity:1}

/* Float score */
.float-score{position:absolute;font-family:'Rye',serif;font-size:1.5rem;color:var(--gold);text-shadow:0 2px 4px rgba(0,0,0,0.3);pointer-events:none;z-index:40;animation:floatUp 1s forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-80px)}}

/* ========== GAME OVER ========== */
#gameover-screen{
background:linear-gradient(180deg,#1a1209 0%,#2a1a08 40%,#3d2410 100%)}
.go-title{font-family:'Rye',serif;font-size:clamp(1.8rem,7vw,3rem);color:var(--terracota);text-shadow:0 3px 0 #4a1010;margin-bottom:5px}
.go-score{font-family:'Rye',serif;font-size:clamp(3rem,12vw,5rem);color:var(--gold);text-shadow:0 4px 0 #8b5e1a}
.go-label{font-size:0.7rem;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:3px;margin-bottom:5px}
.go-stats{display:flex;gap:30px;margin:20px 0}
.go-stat{text-align:center}
.go-stat-val{font-family:'Rye',serif;font-size:1.5rem;color:var(--gold)}
.go-stat-label{font-size:0.6rem;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px}
.go-best{font-size:0.8rem;color:var(--gold);margin:10px 0}
.btn-retry{padding:16px 50px;font-family:'Rye',serif;font-size:1.1rem;color:var(--dark);background:linear-gradient(135deg,var(--gold),#e8c36a);border:none;border-radius:50px;cursor:pointer;box-shadow:0 5px 0 #8b5e1a;margin-top:15px;letter-spacing:2px}
.btn-retry:active{transform:translateY(3px);box-shadow:0 2px 0 #8b5e1a}
.btn-share{margin-top:10px;padding:10px 30px;background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);border-radius:30px;font-size:0.75rem;cursor:pointer;font-family:'Inter',sans-serif}

/* Leaderboard mini */
.leaderboard{margin-top:15px;width:80%;max-width:300px}
.lb-title{font-size:0.6rem;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:2px;text-align:center;margin-bottom:8px}
.lb-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.75rem}
.lb-rank{color:var(--gold);width:20px}
.lb-name{color:rgba(255,255,255,0.6);flex:1}
.lb-pts{color:var(--gold);font-weight:700}
</style>
</head>
<body>

<!-- TITLE -->
<div id="title-screen" class="screen active">
  <div class="title-dust"></div>
  <div class="title-logo">SHERIFF<br>SHOWDOWN</div>
  <div class="title-sub">Captura a los villanos</div>
  <div class="sheriff-idle">
    <div class="body">
      <div class="hat"></div>
      <div class="head"><div class="hair"></div></div>
      <div class="torso">
        <div class="star">★</div>
        <div class="arms">
          <div class="arm left"></div>
          <div class="arm right"></div>
        </div>
        <div class="gun"></div>
      </div>
      <div class="legs">
        <div class="leg left"></div>
        <div class="leg right"></div>
      </div>
    </div>
  </div>
  <button class="btn-play" onclick="startGame()">JUGAR</button>
  <div class="title-scores" id="title-best"></div>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div class="game-hud">
    <div>
      <div class="hud-score" id="hud-score">0</div>
      <div class="hud-combo" id="hud-combo"></div>
    </div>
    <div style="text-align:center">
      <div class="hud-wave" id="hud-wave">Oleada 1</div>
    </div>
    <div style="text-align:right">
      <div class="hud-lives" id="hud-lives"></div>
    </div>
  </div>
  
  <div class="arena" id="arena">
    <div class="duelist sheriff" id="sheriff">
      <div class="d-hat"></div>
      <div class="d-head"></div>
      <div class="d-body">
        <div class="d-arm-gun"><div class="d-gun"></div></div>
      </div>
      <div class="d-legs"><div class="d-leg"></div><div class="d-leg"></div></div>
    </div>
    <div class="duelist villain" id="villain">
      <div class="d-hat"></div>
      <div class="d-head"></div>
      <div class="d-body">
        <div class="d-arm-gun"><div class="d-gun"></div></div>
      </div>
      <div class="d-legs"><div class="d-leg"></div><div class="d-leg"></div></div>
    </div>
    
    <div class="countdown" id="countdown"></div>
    
    <div class="tug-container" id="tug-container" style="display:none">
      <div class="tug-label-l">Sheriff</div>
      <div class="tug-label-r">Villano</div>
      <div class="tug-bar">
        <div class="tug-fill" id="tug-fill"></div>
        <div class="tug-center"></div>
      </div>
    </div>
    
    <div class="capture-flash" id="capture-flash"></div>
  </div>
  
  <div class="tap-zone" id="tap-zone">
    <div class="tap-btn" id="tap-btn"><span class="tap-icon">🔫</span></div>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameover-screen" class="screen">
  <div class="go-title">Fin de turno</div>
  <div class="go-label">Puntuacion</div>
  <div class="go-score" id="go-score">0</div>
  <div class="go-stats">
    <div class="go-stat"><div class="go-stat-val" id="go-captures">0</div><div class="go-stat-label">Capturas</div></div>
    <div class="go-stat"><div class="go-stat-val" id="go-max-combo">0</div><div class="go-stat-label">Max Combo</div></div>
    <div class="go-stat"><div class="go-stat-val" id="go-wave">1</div><div class="go-stat-label">Oleada</div></div>
  </div>
  <div class="go-best" id="go-best"></div>
  <button class="btn-retry" onclick="startGame()">DE NUEVO</button>
  <button class="btn-share" onclick="shareScore()">Compartir</button>
  <div class="leaderboard" id="leaderboard"></div>
</div>

<script>
// ========== CONFIG ==========
const SUPABASE_URL = ''; // Will be set when project is ready
const SUPABASE_KEY = '';
const DB_READY = !!(SUPABASE_URL && SUPABASE_KEY);

// ========== STATE ==========
let score = 0;
let lives = 3;
let combo = 0;
let maxCombo = 0;
let captures = 0;
let wave = 1;
let tugPos = 50; // 0=villain wins, 100=sheriff wins
let villainSpeed = 0.3;
let gameActive = false;
let tugInterval = null;
let villainInterval = null;
let bestScore = parseInt(localStorage.getItem('ss_best') || '0');

// Villain types
const VILLAINS = [
  { name: 'Bandido', speed: 0.3, color: '#8b2020' },
  { name: 'Forajido', speed: 0.5, color: '#6b4400' },
  { name: 'Dinamitero', speed: 0.7, color: '#333' },
  { name: 'El Jefe', speed: 1.0, color: '#1a1a1a' },
];

// ========== SCREENS ==========
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ========== GAME START ==========
function startGame() {
  score = 0; lives = 3; combo = 0; maxCombo = 0; captures = 0; wave = 1;
  updateHUD();
  showScreen('game-screen');
  document.getElementById('title-best').textContent = bestScore > 0 ? `Mejor: ${bestScore}` : '';
  nextDuel();
}

function updateHUD() {
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-combo').textContent = combo > 1 ? `COMBO x${combo}` : '';
  document.getElementById('hud-wave').textContent = `Oleada ${wave}`;
  let livesHTML = '';
  for (let i = 0; i < 3; i++) livesHTML += `<span class="hud-life">${i < lives ? '★' : '☆'}</span>`;
  document.getElementById('hud-lives').innerHTML = livesHTML;
}

// ========== DUEL SEQUENCE ==========
async function nextDuel() {
  if (lives <= 0) return gameOver();
  
  gameActive = false;
  tugPos = 50;
  document.getElementById('tug-fill').style.width = '50%';
  document.getElementById('tug-container').style.display = 'none';
  document.getElementById('tap-zone').classList.remove('active');
  
  const cd = document.getElementById('countdown');
  
  // Countdown
  for (const text of ['3', '2', '1']) {
    cd.textContent = text;
    cd.className = 'countdown show';
    await wait(700);
    cd.className = 'countdown';
    await wait(100);
  }
  
  // DRAW!
  cd.textContent = 'DRAW!';
  cd.className = 'countdown show draw';
  
  // Haptic
  if (navigator.vibrate) navigator.vibrate(50);
  
  await wait(400);
  cd.className = 'countdown';
  
  // Start tug of war
  document.getElementById('tug-container').style.display = 'block';
  document.getElementById('tap-zone').classList.add('active');
  gameActive = true;
  
  // Villain auto-push
  const vType = VILLAINS[Math.min(Math.floor((wave - 1) / 3), VILLAINS.length - 1)];
  const vSpeed = vType.speed + (wave * 0.05);
  
  villainInterval = setInterval(() => {
    if (!gameActive) return;
    tugPos -= vSpeed;
    // Random bursts from villain
    if (Math.random() < 0.05 * wave) tugPos -= 2;
    tugPos = Math.max(0, Math.min(100, tugPos));
    document.getElementById('tug-fill').style.width = tugPos + '%';
    
    // Check win/lose
    if (tugPos <= 5) endDuel(false);
    if (tugPos >= 95) endDuel(true);
  }, 30);
}

// ========== TAP ==========
document.getElementById('tap-btn').addEventListener('pointerdown', (e) => {
  e.preventDefault();
  if (!gameActive) return;
  
  tugPos += 3 + (combo * 0.2);
  tugPos = Math.min(100, tugPos);
  document.getElementById('tug-fill').style.width = tugPos + '%';
  
  // Screen shake on fast taps
  document.getElementById('arena').classList.add('shake');
  setTimeout(() => document.getElementById('arena').classList.remove('shake'), 100);
  
  // Haptic
  if (navigator.vibrate) navigator.vibrate(10);
});

// Also support touch anywhere in tap zone
document.getElementById('tap-zone').addEventListener('pointerdown', (e) => {
  if (e.target === document.getElementById('tap-zone')) {
    if (!gameActive) return;
    tugPos += 2;
    tugPos = Math.min(100, tugPos);
    document.getElementById('tug-fill').style.width = tugPos + '%';
  }
});

// ========== END DUEL ==========
function endDuel(won) {
  gameActive = false;
  clearInterval(villainInterval);
  
  if (won) {
    // CAPTURED!
    combo++;
    if (combo > maxCombo) maxCombo = combo;
    captures++;
    const pts = 100 * combo + (wave * 25);
    score += pts;
    
    // Flash
    const flash = document.getElementById('capture-flash');
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 200);
    
    // Float score
    const float = document.createElement('div');
    float.className = 'float-score';
    float.textContent = `+${pts}`;
    float.style.left = '50%';
    float.style.top = '40%';
    document.getElementById('arena').appendChild(float);
    setTimeout(() => float.remove(), 1000);
    
    // Haptic
    if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
    
    // Next wave every 3 captures
    if (captures % 3 === 0) wave++;
    
    updateHUD();
    setTimeout(nextDuel, 800);
  } else {
    // ESCAPED
    lives--;
    combo = 0;
    
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    
    updateHUD();
    
    if (lives <= 0) {
      setTimeout(gameOver, 600);
    } else {
      setTimeout(nextDuel, 1000);
    }
  }
}

// ========== GAME OVER ==========
function gameOver() {
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('ss_best', String(bestScore));
  }
  
  document.getElementById('go-score').textContent = score;
  document.getElementById('go-captures').textContent = captures;
  document.getElementById('go-max-combo').textContent = maxCombo;
  document.getElementById('go-wave').textContent = wave;
  document.getElementById('go-best').textContent = score >= bestScore ? '¡Nuevo record!' : `Mejor: ${bestScore}`;
  
  // Save to Supabase
  if (DB_READY) saveScore();
  
  // Load leaderboard
  loadLeaderboard();
  
  showScreen('gameover-screen');
}

// ========== SUPABASE ==========
async function saveScore() {
  const name = localStorage.getItem('ss_name') || 'Anonimo';
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/scores`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      },
      body: JSON.stringify({ name, score, captures, max_combo: maxCombo, wave })
    });
  } catch(e) { console.error(e); }
}

async function loadLeaderboard() {
  const container = document.getElementById('leaderboard');
  if (!DB_READY) {
    container.innerHTML = '';
    return;
  }
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/scores?select=name,score&order=score.desc&limit=5`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    container.innerHTML = `<div class="lb-title">Top Sheriffs</div>` +
      data.map((d, i) => `<div class="lb-row"><span class="lb-rank">${i + 1}</span><span class="lb-name">${d.name}</span><span class="lb-pts">${d.score}</span></div>`).join('');
  } catch(e) { container.innerHTML = ''; }
}

// ========== SHARE ==========
function shareScore() {
  const text = `🤠 Sheriff Showdown — ${score} pts, ${captures} capturas, Oleada ${wave}. ¿Puedes ganarme?`;
  if (navigator.share) {
    navigator.share({ title: 'Sheriff Showdown', text, url: location.href });
  } else {
    const waUrl = `https://wa.me/?text=${encodeURIComponent(text + ' ' + location.href)}`;
    window.open(waUrl, '_blank');
  }
}

// ========== UTILS ==========
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

// Init
document.getElementById('title-best').textContent = bestScore > 0 ? `Mejor: ${bestScore}` : '';
</script>
</body>
</html>
